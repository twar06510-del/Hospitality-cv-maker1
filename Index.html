<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Global Hospitality CV Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060911;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#0d1117;}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px;}
::placeholder{color:#334155!important;}
textarea,input,select{font-family:inherit!important;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.fade{animation:fadeIn 0.3s ease;}
#apiBar{background:#1a1505;border-bottom:1px solid #78350f;padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
#apiBar label{color:#d4af37;font-size:12px;font-weight:700;white-space:nowrap;}
#apiKey{flex:1;min-width:180px;padding:8px 12px;border-radius:8px;background:#0a0f1a;border:1px solid #78350f;color:#f1f5f9;font-size:13px;outline:none;}
#apiKey:focus{border-color:#d4af37;}
#saveKeyBtn{padding:8px 16px;border-radius:8px;border:none;background:#d4af37;color:#0a0a0f;font-weight:700;font-size:12px;cursor:pointer;}
#keyStatus{font-size:11px;color:#94a3b8;width:100%;}
#header{background:#080b11;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:100;}
#headerInner{max-width:1020px;margin:0 auto;padding:0 14px;}
#logoRow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding-top:12px;}
#logoIcon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#d4af37,#b8860b);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 4px 16px rgba(212,175,55,0.35);flex-shrink:0;}
#logoTitle{font-size:16px;font-weight:900;background:linear-gradient(90deg,#d4af37,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#logoSub{font-size:9.5px;color:#334155;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
#tabs{display:flex;gap:1px;padding-top:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#tabs::-webkit-scrollbar{display:none;}
.tb{padding:8px 12px;border:none;border-radius:7px;cursor:pointer;font-weight:500;font-size:12px;font-family:inherit;transition:all .18s;display:flex;align-items:center;gap:4px;white-space:nowrap;background:transparent;color:#94a3b8;}
.tb.active{background:#d4af37;color:#0a0a0f;font-weight:700;}
#content{max-width:1020px;margin:0 auto;padding:20px 14px 80px;}
.card{background:#0d1117;border-radius:12px;margin-bottom:14px;border:1px solid #1e293b;padding:16px 18px;}
.card.gold{border-color:#b8860b;}
.card.dark{background:#080c12;}
.fld{margin-bottom:13px;}
.fld label{display:block;color:#d4af37;font-size:11px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.9px;}
.fld .hint{color:#64748b;font-size:11px;margin:0 0 5px;line-height:1.4;}
.fld input,.fld textarea,.fld select{width:100%;padding:9px 13px;border-radius:8px;background:#0a0f1a;border:1px solid #1e293b;color:#f1f5f9;font-size:13px;outline:none;transition:border-color .2s;resize:vertical;line-height:1.5;}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:#d4af37;}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;transition:all .18s;display:inline-flex;align-items:center;gap:6px;justify-content:center;}
.btn.pri{background:#d4af37;color:#0a0a0f;}
.btn.sec{background:#1e293b;color:#f1f5f9;}
.btn.ghost{background:transparent;color:#d4af37;border:1px solid #d4af37;}
.btn.danger{background:#450a0a;color:#f87171;border:1px solid #7f1d1d;}
.btn.grn{background:#052e16;color:#4ade80;border:1px solid #166534;}
.btn.sm{padding:6px 13px;font-size:12px;}
.btn.full{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 18px;}
.g2g{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
@media(max-width:600px){.g2,.g2g{grid-template-columns:1fr;gap:0;}.g3{grid-template-columns:1fr 1fr;}}
@media(max-width:400px){.g3{grid-template-columns:1fr;}}
.alrt{border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:12px;display:flex;gap:7px;align-items:flex-start;line-height:1.5;}
.alrt.err{background:#1a0505;border:1px solid #7f1d1d;color:#f87171;}
.alrt.ok{background:#052e16;border:1px solid #166534;color:#4ade80;}
.alrt.info{background:#0c1f3a;border:1px solid #1e40af;color:#60a5fa;}
.alrt.warn{background:#1c1000;border:1px solid #78350f;color:#fbbf24;}
.tag{padding:3px 9px;border-radius:20px;font-size:11px;display:inline-block;margin:2px 2px 2px 0;}
.tag-row{display:flex;flex-wrap:wrap;gap:3px;}
.spin-wrap{text-align:center;padding:32px 16px;}
.spin{width:36px;height:36px;border:3px solid #1e293b;border-top:3px solid #d4af37;border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px;}
.spin-txt{color:#d4af37;font-size:13px;}
.uz{border:2px dashed #1e293b;border-radius:12px;padding:26px 14px;text-align:center;cursor:pointer;background:#080c12;transition:all .2s;margin-bottom:8px;}
.uz:hover,.uz.drag{border-color:#d4af37;background:#1a1505;}
.uz.has-file{border-color:#166534;background:#052e16;}
.rings-row{display:flex;justify-content:space-around;flex-wrap:wrap;gap:14px;margin-bottom:18px;}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
@media(max-width:480px){.mc-grid{grid-template-columns:1fr;}}
.mc{padding:14px 12px;border-radius:12px;border:2px solid #1e293b;background:#080c12;color:#64748b;cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;}
.mc.active{border-color:#d4af37;background:#1a1505;color:#d4af37;}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.pill{padding:5px 13px;border-radius:20px;border:1px solid #1e293b;background:transparent;color:#64748b;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .18s;}
.pill.active{border-color:#d4af37;background:#1a1505;color:#d4af37;}
.opill{padding:5px 11px;border-radius:20px;border:1px solid #1e293b;background:transparent;color:#64748b;cursor:pointer;font-size:11.5px;font-family:inherit;}
.opill.active{border-color:#d4af37;background:#1a1505;color:#d4af37;}
.cv-pre{background:#080c12;padding:16px;border-radius:8px;border:1px solid #1e293b;color:#e2e8f0;font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:'Courier New',monospace;max-height:480px;overflow-y:auto;}
.cl-pre{background:#080c12;padding:16px;border-radius:8px;border:1px solid #1e293b;color:#e2e8f0;font-size:13px;line-height:1.85;white-space:pre-wrap;font-family:Georgia,serif;max-height:480px;overflow-y:auto;}
.hg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
@media(max-width:480px){.hg{grid-template-columns:repeat(2,1fr);}}
.hi{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:7px;font-size:11.5px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:560px){.sg{grid-template-columns:1fr;}}
.vi{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-radius:8px;background:#080c12;margin-bottom:7px;gap:8px;flex-wrap:wrap;}
.lg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
@media(max-width:560px){.lg-grid{grid-template-columns:1fr 1fr;}}
.lg-card{padding:10px;border-radius:10px;border:2px solid #1e293b;background:#080c12;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s;}
.lg-card.active{border-color:#d4af37;background:#1a1505;color:#d4af37;}
/* TRACKER */
.trk-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr auto;gap:8px;align-items:center;padding:10px 14px;border-radius:8px;background:#080c12;margin-bottom:7px;border:1px solid #1e293b;}
@media(max-width:640px){.trk-row{grid-template-columns:1fr 1fr;gap:6px;}}
.status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-align:center;}
/* SALARY */
.sal-bar{height:10px;border-radius:5px;background:#1e293b;margin:6px 0;overflow:hidden;}
.sal-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#d4af37,#f5c842);transition:width 1s ease;}
/* COMPARE */
.cmp-col{border-radius:10px;border:1px solid #1e293b;padding:14px;background:#080c12;}
.cmp-col.best{border-color:#166534;background:#030f07;}
/* PHOTO TOGGLE */
.photo-placeholder{width:100px;height:120px;border-radius:8px;border:2px dashed #d4af37;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1505;cursor:pointer;flex-shrink:0;}
</style>
</head>
<body>

<!-- API KEY BAR -->
<div id="apiBar">
  <label>🔑 API Key:</label>
  <input type="password" id="apiKey" placeholder="sk-ant-api03-… (get free at console.anthropic.com)"/>
  <button id="saveKeyBtn">Save Key</button>
  <div id="keyStatus">Key stored only in this browser. <a href="https://console.anthropic.com" target="_blank" style="color:#d4af37;">Get free key →</a></div>
</div>

<!-- HEADER -->
<div id="header">
  <div id="headerInner">
    <div id="logoRow">
      <div style="display:flex;align-items:center;gap:9px;">
        <div id="logoIcon">🍽️</div>
        <div><div id="logoTitle">Global Hospitality CV Pro</div><div id="logoSub">ATS Optimization Engine</div></div>
      </div>
      <div id="hdrBadges" style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;"></div>
    </div>
    <div id="tabs">
      <button class="tb active" data-tab="profile">👤 Profile</button>
      <button class="tb" data-tab="cv">📄 Generate CV</button>
      <button class="tb" data-tab="cover">✉️ Cover Letter</button>
      <button class="tb" data-tab="analyze">🔍 Analyze JD</button>
      <button class="tb" data-tab="health">🩺 Health Check</button>
      <button class="tb" data-tab="compare">📊 CV Compare</button>
      <button class="tb" data-tab="multi">🌍 Multi-Lang CV</button>
      <button class="tb" data-tab="salary">💰 Salary Guide</button>
      <button class="tb" data-tab="tracker">📧 Job Tracker</button>
      <button class="tb" data-tab="reference">📝 Reference Letter</button>
    </div>
  </div>
</div>

<div id="content"></div>

<div style="border-top:1px solid #080c14;padding:12px 16px;text-align:center;">
  <p style="color:#1e293b;font-size:11px;">🏨 Marriott · Hilton · Hyatt · Accor · IHG · Jumeirah · Four Seasons · Mandarin Oriental · Fairmont</p>
</div>

<script>
// ══════════════════════════════════════
// CORE SETUP
// ══════════════════════════════════════
const SK='hcv_v3';
const ld=()=>{try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}};
const sv=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch{}};
let store=ld();
let apiKey=store.apiKey||'';
let profile=store.profile||{};
let cvVersions=store.cvVersions||[];
let jobTracker=store.jobTracker||[];
let activeTab='profile';

// API key UI
document.getElementById('apiKey').value=apiKey?'••••••••••••••••••':'';
document.getElementById('saveKeyBtn').onclick=()=>{
  const v=document.getElementById('apiKey').value.trim();
  if(!v||v.startsWith('•')){setKeyStatus('Paste your actual key first.','err');return;}
  apiKey=v;store.apiKey=v;sv(store);
  document.getElementById('apiKey').value='••••••••••••••••••';
  setKeyStatus('✅ Key saved!','ok');
};
function setKeyStatus(msg,type){
  const el=document.getElementById('keyStatus');
  el.innerHTML=`<span style="color:${type==='ok'?'#4ade80':'#f87171'}">${msg}</span> <a href="https://console.anthropic.com" target="_blank" style="color:#d4af37;">Get free key →</a>`;
}

const SYS=`You are an elite hospitality CV specialist and ATS expert with 20 years placing chefs and hospitality professionals at Marriott, Hilton, Hyatt, Accor, IHG, Jumeirah. Write in a confident, natural human voice — never robotic. Always respond with valid JSON only — no markdown fences, no extra text.`;

async function ai(prompt,maxTok=1800){
  if(!apiKey)throw new Error('Please enter your Anthropic API key first.');
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,system:SYS,messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(b=>b.text||'').join('');
}

function pj(raw){return JSON.parse(raw.replace(/```json|```/g,'').trim());}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dlFile(text,name){const b=new Blob([text],{type:'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file);});}
function scoreCol(s){return s>=80?'#4ade80':s>=60?'#f59e0b':'#f87171';}

function ring(score,label,size=80){
  const r=size/2-9,ci=2*Math.PI*r,d=Math.max(0,Math.min(score,100))/100*ci,col=scoreCol(score);
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e293b" stroke-width="7"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="7"
        stroke-dasharray="${d} ${ci}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/>
      <text x="50%" y="50%" text-anchor="middle" dy=".38em"
        style="fill:${col};font-size:${size*.21}px;font-weight:800;font-family:inherit;">${score}</text>
    </svg>
    <span style="font-size:10px;color:#94a3b8;text-align:center;max-width:${size+10}px;line-height:1.3;">${label}</span>
  </div>`;
}

function tags(items,col,bg,bdr){
  if(!items?.length)return'<span style="color:#64748b;font-size:11px;">None</span>';
  return items.map(it=>`<span class="tag" style="color:${col};background:${bg};border:1px solid ${bdr};">${esc(it)}</span>`).join('');
}

function alrt(msg,type='err'){
  const ic={err:'⚠️',ok:'✅',info:'ℹ️',warn:'💡'};
  return`<div class="alrt ${type}"><span>${ic[type]}</span><span>${msg}</span></div>`;
}

function spinner(txt){return`<div class="spin-wrap"><div class="spin"></div><p class="spin-txt">${txt}</p></div>`;}

function profStr(){return`Name:${profile.name||''} Title:${profile.title||''}\nEmail:${profile.email||''} Phone:${profile.phone||''} Location:${profile.location||''}\nSummary:${profile.summary||''}\nExperience:${profile.experience||''}\nEducation:${profile.education||''}\nSkills:${profile.skills||''}\nLanguages:${profile.languages||''}\nAwards:${profile.awards||''}`;}

// Tab switching
document.getElementById('tabs').onclick=e=>{
  const b=e.target.closest('.tb');
  if(b)setTab(b.dataset.tab);
};
function setTab(t){
  activeTab=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  render();
}

function updBadges(){
  const done=profile.name&&profile.experience;
  document.getElementById('hdrBadges').innerHTML=profile.name
    ?`<span style="background:#0d1117;border:1px solid #1e293b;border-radius:20px;padding:4px 12px;font-size:12px;color:#94a3b8;">👋 ${esc(profile.name)}${done?' <span style="color:#4ade80">✅</span>':''}</span>`
    :`<span style="background:#140800;border:1px solid #78350f;border-radius:20px;padding:4px 12px;font-size:12px;color:#fbbf24;cursor:pointer;" onclick="setTab('profile')">⚠️ Complete profile</span>`;
}

function render(){
  updBadges();
  const c=document.getElementById('content');
  const map={profile:renderProfile,cv:renderCV,cover:renderCover,analyze:renderAnalyze,health:renderHealth,compare:renderCompare,multi:renderMulti,salary:renderSalary,tracker:renderTracker,reference:renderReference};
  c.innerHTML=(map[activeTab]||renderProfile)();
  bindTab();
}

// ══════════════════════════════════════
// PROFILE
// ══════════════════════════════════════
function renderProfile(){
  const p=profile;
  const checks=[
    {k:'name',l:'Full Name',done:!!p.name},{k:'email',l:'Email',done:!!p.email},
    {k:'phone',l:'Phone',done:!!p.phone},{k:'title',l:'Job Title',done:!!p.title},
    {k:'summary',l:'Summary',done:!!p.summary},
    {k:'experience',l:'Experience',done:!!(p.experience&&p.experience.length>50)},
    {k:'education',l:'Education',done:!!p.education},{k:'skills',l:'Skills',done:!!p.skills},
    {k:'languages',l:'Languages',done:!!p.languages},
  ];
  const sc=Math.round(checks.filter(c=>c.done).length/checks.length*100);
  return`
  <h2 style="color:#d4af37;font-size:18px;margin:0 0 4px;">👤 My Profile</h2>
  <p style="color:#64748b;font-size:13px;margin-bottom:18px;">Saved permanently. Auto-fills every CV, letter and tool — fill once.</p>
  <div class="card dark">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
      <div><h4 style="color:#d4af37;margin:0 0 3px;font-size:13px;">🩺 Profile Health</h4>
        <p style="color:#64748b;font-size:11.5px;margin:0;">${sc===100?'Perfect — all fields complete.':checks.filter(c=>!c.done).length+' fields missing'}</p></div>
      ${ring(sc,'Complete',68)}</div>
    <div class="hg">${checks.map(c=>`<div class="hi" style="background:${c.done?'#052e16':'#1a0505'};border:1px solid ${c.done?'#166534':'#7f1d1d'};"><span>${c.done?'✅':'❌'}</span><span style="color:${c.done?'#4ade80':'#f87171'};">${c.l}</span></div>`).join('')}</div>
  </div>
  <div id="pSaveMsg"></div>
  <div class="card">
    <h4 style="color:#d4af37;font-size:11px;margin:0 0 12px;text-transform:uppercase;letter-spacing:.9px;">📋 Personal Info</h4>
    <div class="g2">
      <div class="fld"><label>Full Name *</label><input id="pName" value="${esc(p.name||'')}" placeholder="Marco Rossi"/></div>
      <div class="fld"><label>Job Title *</label><input id="pTitle" value="${esc(p.title||'')}" placeholder="Sous Chef / Executive Chef"/></div>
      <div class="fld"><label>Email *</label><input id="pEmail" type="email" value="${esc(p.email||'')}" placeholder="your@email.com"/></div>
      <div class="fld"><label>Phone *</label><input id="pPhone" value="${esc(p.phone||'')}" placeholder="+971 50 000 0000"/></div>
      <div class="fld"><label>Location / Nationality</label><input id="pLocation" value="${esc(p.location||'')}" placeholder="Dubai, UAE | Italian"/></div>
      <div class="fld"><label>LinkedIn</label><input id="pLinkedin" value="${esc(p.linkedin||'')}" placeholder="linkedin.com/in/yourname"/></div>
    </div>
  </div>
  <div class="card">
    <h4 style="color:#d4af37;font-size:11px;margin:0 0 12px;text-transform:uppercase;letter-spacing:.9px;">💼 Professional Details</h4>
    <div class="fld"><label>Professional Summary *</label><p class="hint">2–3 strong sentences. Opening hook on every CV.</p>
      <textarea id="pSummary" rows="3" placeholder="Accomplished Sous Chef with 8+ years across 5-star hotel kitchens…">${esc(p.summary||'')}</textarea></div>
    <div class="fld"><label>Work Experience *</label><p class="hint">Job Title | Company | Location | Dates then bullet points.</p>
      <textarea id="pExperience" rows="7" placeholder="Sous Chef | Marriott Dubai | Jan 2021–Present&#10;• Led brigade of 12&#10;• Managed 400+ daily covers&#10;• Reduced food waste 18%">${esc(p.experience||'')}</textarea></div>
    <div class="fld"><label>Education & Certifications</label>
      <textarea id="pEducation" rows="3" placeholder="Diploma Culinary Arts | Le Cordon Bleu | 2016&#10;HACCP Level 3 | 2022">${esc(p.education||'')}</textarea></div>
    <div class="g2">
      <div class="fld"><label>Key Skills</label><textarea id="pSkills" rows="3" placeholder="Fine Dining, Menu Dev, Food Cost Control, HACCP…">${esc(p.skills||'')}</textarea></div>
      <div class="fld"><label>Languages</label><textarea id="pLanguages" rows="3" placeholder="English (Fluent), Italian (Native), Arabic (Basic)">${esc(p.languages||'')}</textarea></div>
    </div>
    <div class="fld"><label>Awards</label><textarea id="pAwards" rows="2" placeholder="Chef of the Year — Marriott GCC 2023">${esc(p.awards||'')}</textarea></div>
  </div>
  <div style="display:flex;gap:9px;"><button class="btn pri" id="saveProfBtn">💾 Save Profile</button><button class="btn sec" id="resetProfBtn">↩ Reset</button></div>`;
}

// ══════════════════════════════════════
// CV GENERATOR
// ══════════════════════════════════════
let cvS={mode:'jd',jd:'',uploadText:'',uploadName:'',pasteText:'',inM:'upload',region:'Middle East',tmpl:'ats',photo:false,result:null};

function renderCV(){
  const s=cvS;
  return`

function renderSavedV(){

  <div id="savedVL" style="display:none;margin-top:12px;">${cvVersions.map((v,i)=>`<div class="vi"><div><p style="color:#f1f5f9;font-size:13px;margin:0 0 2px;font-weight:600;">${esc(v.label)}</p><p style="color:#64748b;font-size:11px;margin:0;">${v.date} · ATS: ${v.score}</p></div><div style="display:flex;gap:7px;"><button class="btn ghost sm" onclick="loadVer(${i})">Load</button><button class="btn danger sm" onclick="delVer(${i})">Del</button></div></div>`).join('')}</div></div>`;
}

function saveVer(){if(!cvS.result)return;const l=(document.getElementById('cvSL')?.value||'').trim()||`${profile.title||'CV'} — ${cvS.region} — ${new Date().toLocaleDateString()}`;cvVersions.unshift({label:l,date:new Date().toLocaleDateString(),score:cvS.result.ats_score,cv_text:cvS.result.cv_text,result:cvS.result});if(cvVersions.length>10)cvVersions.length=10;store.cvVersions=cvVersions;sv(store);render();}
function loadVer(i){cvS.result=cvVersions[i].result;window._cvText=cvVersions[i].cv_text;render();}
function delVer(i){cvVersions.splice(i,1);store.cvVersions=cvVersions;sv(store);render();}
function toggleEl(id){const e=document.getElementById(id);if(e)e.style.display=e.style.display==='none'?'block':'none';}

          <button class="btn sec sm" onclick="navigator.clipboard.writeText(window._refText)">📋 Copy</button>
        </div>
      </div>
      ${r.tips?`<div style="background:#0a0f1a;border-radius:8px;padding:10px 14px;margin-bottom:12px;border:1px solid #1e293b;"><p style="color:#fbbf24;font-size:12px;margin:0;line-height:1.5;">💡 ${esc(r.tips)}</p></div>`:''}

}

// BIND EVENTS
// ══════════════════════════════════════
function bindTab(){
  const t=activeTab;
  if(t==='profile')bindProfile();
  else if(t==='cv')bindCV();
  else if(t==='cover')bindCover();
  else if(t==='analyze')bindAnalyze();
  else if(t==='health')bindHealth();
  else if(t==='compare')bindCompare();
  else if(t==='multi')bindMulti();
  else if(t==='salary')bindSalary();
  else if(t==='tracker')bindTracker();
  else if(t==='reference')bindReference();
}

function bindProfile(){
  document.getElementById('saveProfBtn').onclick=()=>{
    profile={name:v('pName'),title:v('pTitle'),email:v('pEmail'),phone:v('pPhone'),location:v('pLocation'),linkedin:v('pLinkedin'),summary:v('pSummary'),experience:v('pExperience'),education:v('pEducation'),skills:v('pSkills'),languages:v('pLanguages'),awards:v('pAwards')};
    store.profile=profile;sv(store);
    document.getElementById('pSaveMsg').innerHTML=alrt('Profile saved! All features use your updated data.','ok');
    setTimeout(()=>{const e=document.getElementById('pSaveMsg');if(e)e.innerHTML='';},3000);
    updBadges();
  };
  document.getElementById('resetProfBtn').onclick=render;
}

function v(id){const e=document.getElementById(id);return e?e.value:'';}

function bindCV(){
  const fi=document.getElementById('cvFI');
  if(fi)fi.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{const raw=await readFile(f);const c=raw.replace(/[^\x20-\x7E\n\r\t]/g,' ').replace(/\s{3,}/g,'\n').trim();
      if(c.length<40){document.getElementById('cvErr').innerHTML=alrt('Could not read file. Try "Paste Text".','err');}
      else{cvS.uploadText=c;cvS.uploadName=f.name;render();}
    }catch(err){document.getElementById('cvErr').innerHTML=alrt('File error: '+err.message,'err');}
  };
  bindUZ('cvUZ','cvFI');
  document.getElementById('genCVBtn').onclick=doGenCV;
}

async function doGenCV(){
  if(!profile.name){setErr('cvErr','Complete your profile first.');return;}
  const s=cvS;
  if(s.mode==='jd'){const e=document.getElementById('cvJD');if(e)s.jd=e.value;}
  else if(s.inM==='paste'){const e=document.getElementById('cvPaste');if(e)s.pasteText=e.value;}
  const inp=s.mode==='jd'?s.jd:s.inM==='upload'?s.uploadText:s.pasteText;
  if(s.mode!=='jd'&&!inp.trim()){setErr('cvErr','Please upload or paste your CV.');return;}
  clearErr('cvErr');setSpin('cvSpin','Analyzing · Optimizing keywords · Rewriting…');dis('genCVBtn',true);
  const prompt=`CANDIDATE:\n${profStr()}\nRegion:${s.region} Template:${s.tmpl} Photo:${s.photo}\n${s.mode==='jd'?'JOB DESCRIPTION:\n'+inp:'EXISTING CV TO REWRITE:\n'+inp}\n\nGenerate complete ATS-optimized CV. Strong action verbs (Led,Managed,Executed,Delivered,Coordinated,Implemented). Quantifiable achievements. NO weak phrases. Format with ════ dividers.\n${s.photo?'Include a [PHOTO] placeholder at the top of the CV header for Middle East applications.':''}\nReturn ONLY JSON:\n{"cv_text":"full cv","ats_score":85,"keyword_match":82,"formatting_score":91,"skills_score":79,"keywords_found":["k1"],"improvements":["i1"],"strong_points":["s1"],"weak_phrases_removed":["p1"],"action_verbs_added":["Led"]}`;
  try{const raw=await ai(prompt,2000);cvS.result=pj(raw);clearSpin('cvSpin');document.getElementById('cvRes').innerHTML=renderCVResult(cvS.result);}
  catch(e){clearSpin('cvSpin');setErr('cvErr',e.message);}
  dis('genCVBtn',false);
}

function bindCover(){
  document.getElementById('genCLBtn').onclick=async()=>{
    if(!profile.name){setErr('clErr','Complete your profile first.');return;}
    clS.company=v('clCo');clS.manager=v('clMgr');clS.jd=v('clJD');
    const words={short:150,standard:250,detailed:400};
    clearErr('clErr');setSpin('clSpin','Crafting a natural human-sounding letter…');dis('genCLBtn',true);
    const prompt=`CANDIDATE:${profile.name}|${profile.title}\nEmail:${profile.email}|Phone:${profile.phone}\nExp:${(profile.experience||'').substring(0,600)}\nSkills:${profile.skills}\nSummary:${profile.summary}\n\nCompany:${clS.company||'the hotel'}\nHiring Manager:${clS.manager||'Hiring Manager'}\nJD:${clS.jd||'General hospitality position'}\nLength:~${words[clS.length]} words\n\nWrite ${clS.length} cover letter. Return ONLY JSON:\n{"cover_letter":"full letter","tone_notes":"one line","keywords_included":["k1","k2"]}\nRULES: Confident human professional. NEVER "I am excited to apply" or AI phrases. Specific achievements. Strong hook opening.`;
    try{const raw=await ai(prompt,1200);clS.result=pj(raw);clearSpin('clSpin');document.getElementById('clRes').innerHTML=renderCLResult(clS.result);}
    catch(e){clearSpin('clSpin');setErr('clErr',e.message);}
    dis('genCLBtn',false);
  };
}

function bindTracker(){
  document.getElementById('addTrkBtn').onclick=()=>{
    const hotel=v('trkHotel').trim();if(!hotel){return;}
    const job={hotel,role:v('trkRole'),date:v('trkDate')||new Date().toISOString().split('T')[0],status:v('trkStatus')||'Applied',notes:v('trkNotes')};
    jobTracker.unshift(job);store.jobTracker=jobTracker;sv(store);render();

function updateTrkStatus(i,status){jobTracker[i].status=status;store.jobTracker=jobTracker;sv(store);render();}
function delTrk(i){jobTracker.splice(i,1);store.jobTracker=jobTracker;sv(store);render();}

function bindReference(){
  document.getElementById('refBtn').onclick=async()=>{
    if(!profile.name){setErr('refErr','Complete your profile first.');return;}
    refS.refName=v('refName');refS.refTitle=v('refTitle');refS.refCompany=v('refCompany')||'';refS.refRelation=v('refRelation')||'';refS.candidateRole=v('refCandRole');

    catch(e){clearSpin('refSpin');setErr('refErr',e.message);}
    dis('refBtn',false);

}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function setErr(id,msg){const e=document.getElementById(id);if(e)e.innerHTML=alrt(msg,'err');}
function clearErr(id){const e=document.getElementById(id);if(e)e.innerHTML='';}
function setSpin(id,txt){const e=document.getElementById(id);if(e)e.innerHTML=spinner(txt);}
function clearSpin(id){const e=document.getElementById(id);if(e)e.innerHTML='';}
function dis(id,val){const e=document.getElementById(id);if(e)e.disabled=val;}

function bindUZ(zoneId,inputId){
  const zone=document.getElementById(zoneId);
  const fi=document.getElementById(inputId);
  if(!zone||!fi)return;
  zone.ondragover=e=>{e.preventDefault();zone.classList.add('drag');};
  zone.ondragleave=()=>zone.classList.remove('drag');
  zone.ondrop=async e=>{
    e.preventDefault();zone.classList.remove('drag');
    const f=e.dataTransfer.files[0];
    if(f){const ev=new Event('change');Object.defineProperty(ev,'target',{value:{files:[f]}});fi.onchange&&fi.onchange({target:{files:[f]}});}
  };
}
